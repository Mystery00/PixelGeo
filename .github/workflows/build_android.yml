name: Build Android
on:
  push:
    tags:
      - 'v*'
env:
  AAB_DIR: "composeApp/build/outputs/bundle/release"
  SIGN_KEY_STORE_FILE: "/tmp/key.jks"
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 设置JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
      - name: 设置Android SDK
        uses: android-actions/setup-android@v3
      - name: 解密签名
        run: |
          echo ${{ secrets.SIGN_KEY_BASE64 }} | base64 --decode > /tmp/key.jks
          echo ${{ secrets.AG_CONNECT_JSON }} | base64 --decode > composeApp/agconnect-services.json
      - run: chmod a+x gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: 构建 AAB
        env:
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_STORE_PASSWORD: ${{ secrets.SIGN_KEY_STORE_PASSWORD }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
          SIGN_KEY_STORE_FILE: "/tmp/key.jks"
        run: |
          ./gradlew composeApp:updateAppleBuildVersion
          ./gradlew :composeApp:bundleRelease
      - name: 安装工具
        run: |
          BUNDLETOOL_VERSION=1.17.2
          curl -fsSL "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar" -o bundletool.jar
      - name: 生成 Universal APK
        run: |
          mkdir -p apk-output
          AAB_FILE="${{ env.AAB_DIR }}/composeApp-release.aab"
          FILENAME="PixelGeo-${GITHUB_REF_NAME}"
          java -jar bundletool.jar build-apks \
            --bundle="$AAB_FILE" \
            --output=apk-output/app.apks \
            --mode=universal \
            --ks="${{ env.SIGN_KEY_STORE_FILE }}" \
            --ks-pass=pass:${{ secrets.SIGN_KEY_STORE_PASSWORD }} \
            --ks-key-alias=${{ secrets.SIGN_KEY_ALIAS }} \
            --key-pass=pass:${{ secrets.SIGN_KEY_PASSWORD }}
          unzip apk-output/app.apks universal.apk -d apk-output/
          mv apk-output/universal.apk "apk-output/${FILENAME}.apk"
          cp "$AAB_FILE" "apk-output/${FILENAME}.aab"
      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pixel Geo ${{ github.ref_name }}
          tag_name: v${{ github.ref_name }}
          body: |
            ## 下载
            安装到手机请下载 `.apk` 文件。`.aab` 为开发者归档包。
          files: |
            apk-output/PixelGeo-${{ github.ref_name }}.apk
            apk-output/PixelGeo-${{ github.ref_name }}.aab
      - name: 清理签名文件
        if: always()
        run: rm -f "${{ env.SIGN_KEY_STORE_FILE }}"
